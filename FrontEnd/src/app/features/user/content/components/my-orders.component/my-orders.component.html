<app-user-content-wrapper
  [pageName]="'Order Tracking'"
  [subText]="'You have ' + orders.length + ' custom peripherals currently in production.'"
  class="max-w-450 mx-auto"
>
  <div class="flex flex-col gap-8">
    @for (order of orders; track order.id) {
      <app-order-review [order]="order"></app-order-review>
    }
  </div>
</app-user-content-wrapper>
