<header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
  <div>
    <h1 class="text-2xl md:text-3xl lg:text-4xl font-bold tracking-tight text-white">
      {{ pageName() }}
    </h1>
    <p class="text-soft-gray mt-1 text-sm md:text-base">
      {{ subText() }}
    </p>
  </div>

  <button
    routerLink="./"
    [queryParams]="{ mode: 'new-build' }"
    class="bg-secondary hover:opacity-90 text-white px-6 py-3 rounded-lg md:w-fit w-full font-semibold shadow-lg shadow-secondary/20 cursor-pointer whitespace-nowrap flex gap-2 justify-center items-center"
  >
    <i class="fa-solid fa-plus"></i>
    Start a New Build
  </button>
</header>

<section class="flex flex-col gap-8">
  <ng-content />
</section>
